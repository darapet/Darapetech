<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard — Darapet Technology</title>
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="icon" type="image/png" href="../assets/images/logo.png" />
  <link rel="apple-touch-icon" href="../assets/images/logo.png" />
  <link rel="stylesheet" href="../css/animations.css" />
  <link rel="stylesheet" href="../css/background.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/fill/style.css" />
</head>
<body>
  <div class="announcement-strip" id="announcementStrip">
    <div class="strip-inner">
      <div class="strip-logo slide-in-left"><img src="../assets/images/logo.png" alt="DT" class="site-logo-img"></div>
      <div class="strip-typewriter"><span class="typewriter-text" id="typewriterText"></span><span class="cursor">|</span></div>
      <div class="strip-right"><span class="strip-badge">Admin Panel</span></div>
    </div>
  </div>
  <header class="main-header scrolled" id="mainHeader">
    <nav class="nav-container">
      <a href="../index.html" class="nav-logo"><img src="../assets/images/logo.png" alt="Darapet Technology" class="site-logo-img"></a>
      <ul class="nav-links">
        <li><a href="../index.html">← Back to Site</a></li>
      </ul>
      <div class="nav-actions">
        <span style="font-size:0.82rem;color:var(--text-muted)"><i class="ph-fill ph-user-circle-check" style="color:var(--accent-1)"></i> Admin</span>
      </div>
    </nav>
  </header>

  <div id="adminApp"></div>

  <style>
    body { overflow-x: hidden; }
    .admin-layout { padding-top: calc(var(--strip-height) + var(--nav-height)); min-height: 100vh; }
    .admin-sidebar { display: flex; flex-direction: column; }
    .admin-nav { display: flex; flex-direction: column; }
    .unread-badge { background: #ef4444; color: #fff; font-size: 0.65rem; font-weight: 700; padding: 2px 7px; border-radius: 100px; margin-left: auto; }
    .inbox-header { display: grid; grid-template-columns: 1.5fr 1fr 2.5fr 1fr 0.8fr; padding: 12px 20px; background: rgba(56,189,248,0.05); font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text-muted); border-bottom: 1px solid var(--border); gap: 16px; }
    .inbox-row { display: grid; grid-template-columns: 1.5fr 1fr 2.5fr 1fr 0.8fr; padding: 16px 20px; border-bottom: 1px solid var(--border); gap: 16px; align-items: center; transition: var(--transition); cursor: pointer; }
    .inbox-row:last-child { border-bottom: none; }
    .inbox-row:hover { background: var(--bg-card); }
    .inbox-row.unread { background: rgba(56,189,248,0.03); }
    .inbox-row strong { display: block; font-size: 0.88rem; }
    .inbox-row small { color: var(--text-muted); font-size: 0.78rem; }
    .inbox-row > div:nth-child(3) { font-size: 0.82rem; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .inbox-tag { background: rgba(56,189,248,0.1); color: var(--accent-1); font-size: 0.72rem; font-weight: 600; padding: 3px 10px; border-radius: 100px; white-space: nowrap; }
    .status-badge { font-size: 0.72rem; font-weight: 700; padding: 3px 10px; border-radius: 100px; white-space: nowrap; }
    .status-new { background: rgba(239,68,68,0.15); color: #ef4444; }
    .status-replied { background: rgba(16,185,129,0.15); color: #10b981; }
    @media(max-width:768px){.inbox-header,.inbox-row{grid-template-columns:1fr 1fr;}.inbox-row>div:nth-child(3),.inbox-header>span:nth-child(3){display:none}}
  </style>
  <script src="../js/background.js"></script>
  <script src="../js/main.js"></script>
  <script src="../js/socials.js"></script>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="../js/firebase-app.js"></script>
  <script src="../js/agent-waitlist.js"></script>
  <script src="../js/admin-extras.js"></script>
</body>
</html>
