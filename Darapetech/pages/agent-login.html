<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent Login — Darapet Technology</title>
  <link rel="icon" type="image/png" href="../assets/images/logo.png" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0a1628}
    .bg-pattern{position:fixed;inset:0;z-index:0;background:#0a1628;overflow:hidden}
    .bg-pattern::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(59,130,246,0.05) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,0.05) 1px,transparent 1px);background-size:50px 50px}
    .bg-orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.15}
    .bg-orb-1{width:600px;height:600px;top:-200px;left:-200px;background:radial-gradient(circle,#1d4ed8,transparent)}
    .bg-orb-2{width:400px;height:400px;bottom:-100px;right:-100px;background:radial-gradient(circle,#0ea5e9,transparent)}
    .card{position:relative;z-index:1;background:#fff;border-radius:20px;padding:44px 40px;width:100%;max-width:400px;margin:24px;box-shadow:0 24px 64px rgba(0,0,0,0.5)}
    .card-logo{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:28px}
    .card-logo img{height:36px}
    .card-logo span{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:1.1rem;color:#0f172a}
    .badge{display:inline-flex;align-items:center;gap:6px;background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe;border-radius:100px;padding:5px 14px;font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:20px}
    .card h2{font-family:'Space Grotesk',sans-serif;font-size:1.5rem;font-weight:700;color:#0f172a;margin-bottom:6px}
    .card p{color:#64748b;font-size:.88rem;margin-bottom:28px}
    .field{margin-bottom:18px}
    .field label{display:block;font-size:.82rem;font-weight:600;color:#374151;margin-bottom:6px}
    .field input{width:100%;padding:12px 16px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:.92rem;font-family:inherit;color:#0f172a;outline:none;transition:border .2s}
    .field input:focus{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,0.12)}
    .field input::placeholder{color:#9ca3af}
    .btn{width:100%;padding:13px;background:#1d4ed8;color:#fff;border:none;border-radius:10px;font-size:.95rem;font-weight:600;cursor:pointer;font-family:inherit;transition:background .2s}
    .btn:hover{background:#1e40af}
    .btn:disabled{opacity:.6;cursor:not-allowed}
    .err{color:#ef4444;font-size:.83rem;margin-bottom:14px;padding:10px 14px;background:#fef2f2;border-radius:8px;border:1px solid #fecaca;display:none}
    .back{display:block;text-align:center;margin-top:20px;font-size:.85rem;color:#64748b;text-decoration:none}
    .back a{color:#3b82f6}

    /* Change password modal */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;display:flex;align-items:center;justify-content:center;display:none}
    .modal-overlay.open{display:flex}
    .modal{background:#fff;border-radius:20px;padding:36px;max-width:380px;width:100%;margin:20px}
    .modal h3{font-family:'Space Grotesk',sans-serif;font-size:1.3rem;font-weight:700;color:#0f172a;margin-bottom:8px}
    .modal p{color:#64748b;font-size:.88rem;margin-bottom:24px}
  </style>
</head>
<body>
  <div class="bg-pattern">
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
  </div>

  <div class="card">
    <div class="card-logo">
      <img src="../assets/images/logo.png" alt="Darapet Technology">
      <span>Darapet Technology</span>
    </div>
    <div class="badge"><i class="fas fa-headset"></i> Agent Portal</div>
    <h2>Agent Sign In</h2>
    <p>Sign in with the credentials provided by your admin.</p>

    <div class="err" id="loginErr"></div>

    <div class="field">
      <label for="agentEmail">Email address</label>
      <input type="email" id="agentEmail" placeholder="your@email.com" />
    </div>
    <div class="field">
      <label for="agentPassword">Password</label>
      <input type="password" id="agentPassword" placeholder="Enter your password" />
    </div>

    <button class="btn" id="loginBtn">Sign In</button>
    <p class="back" style="margin-top:16px"><a href="login.html">← Back to user login</a></p>
  </div>

  <!-- Change Password Modal -->
  <div class="modal-overlay" id="changePwModal">
    <div class="modal">
      <h3>Set Your Password</h3>
      <p>This is your first login. Please set a new secure password to continue.</p>
      <div class="err" id="changePwErr"></div>
      <div class="field">
        <label>New Password</label>
        <input type="password" id="newPw" placeholder="At least 8 characters" />
      </div>
      <div class="field">
        <label>Confirm Password</label>
        <input type="password" id="confirmPw" placeholder="Repeat password" />
      </div>
      <button class="btn" id="changePwBtn">Save & Continue</button>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="../js/firebase-app.js"></script>
  <script>
    let lastAgentPw = null; // temp password just used to sign in, kept only for a same-session reauth retry

    // If already logged in as agent, redirect
    auth.onAuthStateChanged(async user => {
      if (!user) return;
      try {
        const snap = await db.collection('agents').where('uid','==',user.uid).limit(1).get();
        if (!snap.empty) {
          const agentData = snap.docs[0].data();
          if (agentData.firstLogin) {
            document.getElementById('changePwModal').classList.add('open');
          } else {
            window.location = 'agent-dashboard.html';
          }
        } else {
          // Not an agent — sign out
          await auth.signOut();
        }
      } catch(e) { console.error(e); }
    });

    document.getElementById('loginBtn').addEventListener('click', async () => {
      const email = document.getElementById('agentEmail').value.trim();
      const pw    = document.getElementById('agentPassword').value;
      const errEl = document.getElementById('loginErr');
      const btn   = document.getElementById('loginBtn');
      errEl.style.display = 'none';
      if (!email || !pw) { errEl.textContent='Please fill in all fields.'; errEl.style.display='block'; return; }
      btn.disabled = true; btn.textContent = 'Signing in…';
      try {
        await withTimeout(auth.signInWithEmailAndPassword(email, pw), 15000);
        lastAgentPw = pw;
      } catch(e) {
        errEl.textContent = e.message === 'timeout'
          ? 'This is taking too long. Please check your connection and try again.'
          : (e.code === 'auth/wrong-password' || e.code === 'auth/user-not-found'
          ? 'Invalid email or password.' : e.message);
        errEl.style.display = 'block';
        btn.disabled = false; btn.textContent = 'Sign In';
      }
    });

    document.getElementById('agentPassword').addEventListener('keypress', e => {
      if (e.key === 'Enter') document.getElementById('loginBtn').click();
    });

    document.getElementById('changePwBtn').addEventListener('click', async () => {
      const newPw    = document.getElementById('newPw').value;
      const confirm  = document.getElementById('confirmPw').value;
      const errEl    = document.getElementById('changePwErr');
      const btn      = document.getElementById('changePwBtn');
      errEl.style.display = 'none';
      if (newPw.length < 8) { errEl.textContent='Password must be at least 8 characters.'; errEl.style.display='block'; return; }
      if (newPw !== confirm) { errEl.textContent='Passwords do not match.'; errEl.style.display='block'; return; }
      btn.disabled = true; btn.textContent = 'Saving…';
      try {
        const user = auth.currentUser;
        if (!user) throw new Error('Your session expired. Please sign in again.');
        try {
          await withTimeout(user.updatePassword(newPw), 15000);
        } catch (e) {
          if (e.code === 'auth/requires-recent-login' && lastAgentPw) {
            // Session is stale for this sensitive action — re-authenticate with the
            // temp password they just signed in with, then retry once.
            const cred = firebase.auth.EmailAuthProvider.credential(user.email, lastAgentPw);
            await withTimeout(user.reauthenticateWithCredential(cred), 15000);
            await withTimeout(user.updatePassword(newPw), 15000);
          } else if (e.code === 'auth/requires-recent-login') {
            throw new Error('Your session is too old for this action. Please sign out and sign in again, then set your password.');
          } else {
            throw e;
          }
        }
        const snap = await withTimeout(db.collection('agents').where('uid','==',user.uid).limit(1).get(), 15000);
        if (!snap.empty) {
          await withTimeout(snap.docs[0].ref.update({ firstLogin: false }), 15000);
        }
        window.location = 'agent-dashboard.html';
      } catch(e) {
        errEl.textContent = e.message === 'timeout'
          ? 'This is taking too long. Please check your connection and try again.' : e.message;
        errEl.style.display = 'block';
        btn.disabled = false; btn.textContent = 'Save & Continue';
      }
    });
  </script>
</body>
</html>
